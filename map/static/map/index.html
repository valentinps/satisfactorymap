<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Satisfactory Save Map — see your whole factory in seconds</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" href="favicon.ico" sizes="48x48">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="description" content="Interactive map for Satisfactory save files. Drop your .sav and see your whole factory in seconds — parsed in your browser, nothing uploaded. Search inventories, spot bottlenecks, edit your save.">
<link rel="canonical" href="https://satisfactorymap.net/">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Satisfactory Save Map">
<meta property="og:title" content="Satisfactory Save Map — see your whole factory in seconds">
<meta property="og:description" content="Drop your .sav and see your whole factory in seconds — parsed in your browser, nothing uploaded. Search inventories, spot bottlenecks, edit your save.">
<meta property="og:url" content="https://satisfactorymap.net/">
<meta property="og:image" content="https://satisfactorymap.net/social_card.jpg">
<meta name="twitter:card" content="summary_large_image">
<link rel="stylesheet" href="vendor/leaflet.css">
<link rel="stylesheet" href="map.css">
</head>
<body class="no-category-selected">
<div id="topBar">
  <!-- Hamburger + wordmark share one card that sits flush on the sidebar's
       top edge while the panel is shown (its visual header); panels.js adds
       .detached when the panel is hidden and the cluster becomes a free
       floating card again. -->
  <div id="brandCluster">
    <!-- Shows/hides the whole sidebar overlay (see panels.js). -->
    <button id="menuButton" title="Hide the side panel" aria-expanded="true">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18">
        <path d="M4 6h16M4 12h16M4 18h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
    <button id="logoButton" title="Satisfactory Save Map">
      <span class="logoKicker">Satisfactory</span>
      <span class="logoName">Save Map</span>
    </button>
  </div>
  <div id="mainSearchWrap">
    <div id="searchBox">
      <svg id="searchIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18">
        <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/>
        <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <input type="text" id="mainSearchInput" placeholder="Search for anything&hellip;" autocomplete="off" spellcheck="false">
      <div id="searchSuggestions" style="display:none"></div>
    </div>
  </div>
  <!-- Per-save status views: Dimensional Depot contents (finditem.js) and
       the progression views -- MAM research, alternate recipes, AWESOME Shop,
       HUB milestones, Space Elevator (progression.js). One labeled dropdown
       (panels.js drives open/close) instead of a strip of six bare icon
       tiles: the game icons alone were unreadable, the labels do the work.
       Row ids are load-bearing -- progression.js/finditem.js bind by id. -->
  <!-- Depot is an inventory view, not progression -- its own pill next to
       the dropdown, same style. -->
  <button id="depotIconButton" class="topPillButton" title="Dimensional Depot contents">
    <img src="icons/buildings/Build_CentralStorage_C.png" alt="">
    <span>Depot</span>
  </button>
  <div id="statusMenuWrap">
    <button id="statusMenuButton" class="topPillButton" title="Progression views" aria-expanded="false" aria-haspopup="true">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16">
        <path d="M4 20V10M12 20V4M20 20v-7" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
      <span>Progression</span>
      <svg class="statusMenuChevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="13" height="13">
        <polyline points="6 9 12 15 18 9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div id="statusMenu" style="display:none" role="menu">
      <button id="mamIconButton" class="statusMenuRow" role="menuitem">
        <img src="icons/buildings/Build_Mam_C.png" alt="">
        <span>MAM research</span>
      </button>
      <button id="altRecipesIconButton" class="statusMenuRow" role="menuitem">
        <img src="icons/items/HardDrive.png" alt="">
        <span>Alternate recipes</span>
      </button>
      <button id="shopIconButton" class="statusMenuRow" role="menuitem">
        <img src="icons/items/AwesomeShop.png" alt="">
        <span>AWESOME Shop</span>
      </button>
      <button id="hubIconButton" class="statusMenuRow" role="menuitem">
        <img src="icons/items/Hub.png" alt="">
        <span>HUB milestones</span>
      </button>
      <button id="spaceElevatorIconButton" class="statusMenuRow" role="menuitem">
        <img src="icons/buildings/Build_SpaceElevator_C.png" alt="">
        <span>Space Elevator</span>
      </button>
    </div>
  </div>
</div>

<div id="sidebar">
  <div id="categoryNavPanel">
    <div id="categoryNavHeader">
      <button id="checkAllButton" title="Show everything on the map">Check all</button>
      <button id="uncheckAllButton" title="Hide everything on the map">Uncheck all</button>
    </div>
    <!-- Only shown once at least one object has been individually hidden via
         the right-click context menu (see contextmenu.js/MapApp.hideObject)
         -- "Check all" above doesn't reach these, since they aren't tied to
         any sidebar checkbox at all. -->
    <button id="resetHiddenButton" style="display:none"></button>
    <div id="categoryNavColumn"></div>

    <div id="sidebarFooter">
      <div id="loadPanel">
        <div id="loadPanelHeader">
          <svg class="loadPanelIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="13" height="13">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
            <path d="M8 3v5h8V3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
          </svg>
          <span>Save File</span>
          <!-- Quiet pointer to the native app, placed where someone
               wrestling a big save is already looking. Hidden inside the
               desktop app itself (panels.js checks window.__TAURI__). -->
          <a id="desktopAppLink" href="https://github.com/valentinps/satisfactorymap/releases/latest" target="_blank" rel="noopener" title="Download the desktop app — same map, no browser memory limit">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="11" height="11">
              <path d="M12 3v11m0 0 4-4m-4 4-4-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M4 17v2a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span>Desktop app</span>
          </a>
        </div>
        <!-- The save never leaves the browser: it's parsed locally by the
             WASM parser in worker.js (see save_client.js/data.js). -->
        <div id="uploadDropZone" title="Load a save file">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14">
            <path d="M12 15V4m0 0 4 4m-4-4-4 4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M4 16v3a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span id="uploadDropText">Drop a .sav here or click to browse</span>
        </div>
        <input type="file" id="uploadFileInput" accept=".sav" style="display:none">
        <!-- Desktop only (data.js shows this inside the Tauri shell): pull
             the newest save straight off a dedicated server through the
             official server HTTPS API -- the same one the in-game Server
             Manager uses. The request runs natively in Rust (self-signed
             TLS + no CORS make it impossible from a browser page). -->
        <div id="serverFetchPanel" style="display:none">
          <button id="serverFetchToggle" aria-expanded="false" title="Download the newest save from a dedicated server">
            <span class="serverFetchTitle">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="13" height="13">
                <rect x="4" y="4" width="16" height="7" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.8"/>
                <rect x="4" y="13" width="16" height="7" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.8"/>
                <circle cx="8" cy="7.5" r="1" fill="currentColor"/>
                <circle cx="8" cy="16.5" r="1" fill="currentColor"/>
              </svg>
              <span>From dedicated server</span>
            </span>
            <svg class="saveDetailsChevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14">
              <polyline points="6 9 12 15 18 9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div id="serverFetchForm" style="display:none">
            <input id="serverFetchHost" type="text" placeholder="Server address (host or host:port)" spellcheck="false" autocomplete="off">
            <input id="serverFetchPassword" type="password" placeholder="Admin password" autocomplete="off">
            <label id="serverFetchRemember" title="Keep the password on this machine for next time (stored unencrypted)">
              <input id="serverFetchRememberBox" type="checkbox">
              <span>Remember password</span>
            </label>
            <button id="serverFetchButton" title="Log in, find the newest save on the server and load it">Fetch latest save</button>
          </div>
        </div>
        <div id="loadStatus"></div>
        <div id="loadProgressBar"><div id="loadProgressFill"></div></div>
        <!-- Collapsed-by-default disclosure for everything that isn't the
             load flow itself: the object-count chip is the always-visible
             summary line, the body holds game settings + save export
             (filters.js shows the toggle once a save is loaded and wires the
             expand/collapse). Keeps the footer to three compact rows. -->
        <button id="saveDetailsToggle" style="display:none" aria-expanded="false" title="Show save details">
          <div id="totalObjectCount"></div>
          <svg class="saveDetailsChevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14">
            <polyline points="6 9 12 15 18 9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div id="saveDetails" style="display:none">
          <div id="gameSettingsPanel" style="display:none"></div>
          <button id="downloadSaveBtn" style="display:none" title="Export the current (possibly edited) save as a new .sav file">Download save</button>
        </div>
      </div>
    </div>
  </div>

  <div id="categoryDetailColumn">
    <div id="categoryDetailPane"></div>
  </div>

  <!-- Drag to resize the nav/detail columns (see panels.js) -- direct
       children of #sidebar (not of the columns) so they straddle the column
       borders instead of being clipped by the columns' overflow:hidden. -->
  <div class="panelResizeHandle" id="navResizeHandle" title="Drag to resize"></div>
  <div class="panelResizeHandle" id="detailResizeHandle" title="Drag to resize"></div>
</div>

<div id="map"></div>

<div id="altitudePanel" style="display:none">
  <div class="altitudeTitle">
    <svg class="altitudeTitleIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="11" height="11">
      <path d="M3 17.5 8.5 11l4 4L17 8l4 5.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span>Altitude</span>
  </div>
  <div id="altitudeMaxLabel" class="altitudeValue"></div>
  <div class="altitudeTrackWrap">
    <div class="altitudeTrackBg"></div>
    <div id="altitudeTrackFill" class="altitudeTrackFill"></div>
    <input type="range" id="altitudeMaxSlider" class="altitudeRangeInput" title="Maximum altitude">
    <input type="range" id="altitudeMinSlider" class="altitudeRangeInput" title="Minimum altitude">
  </div>
  <div id="altitudeMinLabel" class="altitudeValue"></div>
  <button id="altitudeResetButton" title="Reset altitude filter">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="12" height="12">
      <path d="M3 12a9 9 0 1 1 2.6 6.4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <polyline points="3 7 3 12 8 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</div>

<div id="activeFilterBanner" style="display:none">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="15" height="15">
    <circle cx="11" cy="11" r="7" fill="none" stroke="#ff9ec2" stroke-width="2"/>
    <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="#ff9ec2" stroke-width="2" stroke-linecap="round"/>
  </svg>
  <span id="activeFilterLabel"></span>
  <button id="activeFilterDetails" title="Show the full list again">Details</button>
  <button id="activeFilterClear" title="Remove this filter and restore every layer that was visible before">Clear filter</button>
</div>

<div id="itemModalOverlay" style="display:none">
  <div id="itemModal">
    <div id="itemModalHeader">
      <img id="itemModalIcon" alt="">
      <span id="itemModalTitle"></span>
      <button id="itemModalClose" title="Close">&times;</button>
    </div>
    <div id="itemModalSummary"></div>
    <div id="itemModalList" class="itemLocationList"></div>
    <button id="itemModalHighlightToggle">Show only these on map</button>
  </div>
</div>

<!-- Building info window (see finditem.js's Building object) -- opened from a
     building search suggestion (click or Enter). Distinct from #itemModal
     since a building's save-wide summary (count/recipes/power/inventory) has
     a richer shape than an item's plain location list. -->
<div id="buildingModalOverlay" style="display:none">
  <div id="buildingModal">
    <div id="buildingModalHeader">
      <img id="buildingModalIcon" alt="">
      <div id="buildingModalHeadings">
        <span id="buildingModalTitle"></span>
        <span id="buildingModalCategory"></span>
      </div>
      <!-- Same show/hide eye as this building's search-suggestion row --
           flips the same sidebar checkbox (see finditem.js). Hidden until
           openBuildingModal binds it to an entry with a live checkbox. -->
      <button id="buildingModalVisibilityToggle" class="visibilityToggle" type="button" style="display:none"></button>
      <button id="buildingModalClose" title="Close">&times;</button>
    </div>
    <div id="buildingModalSummary"></div>
    <div id="buildingModalStats"></div>
    <div id="buildingModalScroll">
      <div id="buildingModalRecipes"></div>
      <div id="buildingModalInventoryLabel" class="buildingModalSectionLabel" style="display:none">Combined inventory</div>
      <div id="buildingModalInventory" class="itemLocationList"></div>
    </div>
    <button id="buildingModalHighlightToggle">Show only this on map</button>
  </div>
</div>

<!-- Progression modal (see progression.js) -- one shared dialog for the
     MAM research / alternate recipes / AWESOME Shop / HUB milestones /
     Space Elevator top-bar buttons. Sectioned scrollable body instead of
     #itemModal's flat list, since every progression view groups its rows
     (by research tree / shop tab / HUB tier). -->
<div id="progressionModalOverlay" style="display:none">
  <div id="progressionModal">
    <div id="progressionModalHeader">
      <img id="progressionModalIcon" alt="">
      <span id="progressionModalTitle"></span>
      <button id="progressionModalClose" title="Close">&times;</button>
    </div>
    <div id="progressionModalSummary"></div>
    <div id="progressionModalBody"></div>
  </div>
</div>

<!-- Right-click context menu (see contextmenu.js) -- shown on a plain
     right-click (no drag) over a map object; a real right-drag still opens
     the rectangle selection below instead. -->
<div id="contextMenu" style="display:none"></div>

<!-- Right-drag rectangle selection (see selection.js). -->
<div id="selectionRect" style="display:none"></div>

<div id="selectionPanel" style="display:none">
  <span id="selectionCount"></span>
  <div id="selectionPanelButtons">
    <button id="selectionObjectsBtn">List objects</button>
    <button id="selectionInventoryBtn">Total inventory</button>
    <button id="selectionMoveBtn">Move</button>
    <button id="selectionOffsetBtn" title="Move by exact offsets (the only way to change altitude)">Offset…</button>
    <button id="selectionCopyBtn" title="Copy the selection; paste with Ctrl+V or right-click">Copy</button>
    <button id="selectionDeleteBtn" title="Delete the selected objects from the save (undo with Ctrl+Z)">Delete</button>
    <button id="selectionClearBtn" title="Clear selection">&times;</button>
  </div>
</div>

<!-- Save-editor overlays (editor.js): pending-edit toolbar, ghost placement
     rectangle + hint, and the precise-offset dialog. -->
<div id="editorToolbar" style="display:none">
  <span id="editorEditCount"></span>
  <button id="editorUndoBtn" title="Undo last edit (Ctrl+Z)">Undo</button>
  <button id="editorRedoBtn" title="Redo (Ctrl+Y)">Redo</button>
</div>
<div id="editorHint" style="display:none">Click to place &middot; R rotate 90&deg; &middot; Esc cancel</div>

<div id="offsetDialogOverlay" style="display:none">
  <div id="offsetDialog">
    <div id="offsetDialogTitle">Move by offset</div>
    <div class="offsetRow"><label for="offsetDx">East / West (m)</label><input type="number" id="offsetDx" step="1" value="0"></div>
    <div class="offsetRow"><label for="offsetDy">South / North (m)</label><input type="number" id="offsetDy" step="1" value="0"></div>
    <div class="offsetRow"><label for="offsetDz">Up / Down (m)</label><input type="number" id="offsetDz" step="1" value="0"></div>
    <div class="offsetRow"><label for="offsetRot">Rotate</label>
      <select id="offsetRot">
        <option value="0">0&deg;</option>
        <option value="90">90&deg;</option>
        <option value="180">180&deg;</option>
        <option value="270">270&deg;</option>
      </select>
    </div>
    <div id="offsetDialogButtons">
      <button id="offsetCancelBtn">Cancel</button>
      <button id="offsetApplyBtn">Apply</button>
    </div>
  </div>
</div>

<!-- Paste placement panel (editor.js): non-modal so the map stays usable --
     a map click fills the custom position, the ghost previews where the
     selection's center lands, and Paste commits. -->
<div id="pastePanel" style="display:none">
  <div id="pastePanelTitle">Paste</div>
  <div id="pastePosModes">
    <label><input type="radio" name="pastePosMode" id="pastePosOriginal" checked> Original location</label>
    <label><input type="radio" name="pastePosMode" id="pastePosCustom"> Custom (type or click the map)</label>
  </div>
  <div class="offsetRow"><label for="pasteX">X (m)</label><input type="number" id="pasteX" step="1" value="0"></div>
  <div class="offsetRow"><label for="pasteY">Y (m)</label><input type="number" id="pasteY" step="1" value="0"></div>
  <div class="offsetRow"><label for="pasteZ" title="Altitude of the selection's center">Altitude (m)</label><input type="number" id="pasteZ" step="1" value="0"></div>
  <div class="pastePanelDivider"></div>
  <div class="offsetRow"><label for="pasteDx">Offset East / West (m)</label><input type="number" id="pasteDx" step="1" value="0"></div>
  <div class="offsetRow"><label for="pasteDy">Offset South / North (m)</label><input type="number" id="pasteDy" step="1" value="0"></div>
  <div class="offsetRow"><label for="pasteDz">Offset Up / Down (m)</label><input type="number" id="pasteDz" step="1" value="0"></div>
  <div class="offsetRow"><label for="pasteRot">Rotate</label>
    <select id="pasteRot">
      <option value="0">0&deg;</option>
      <option value="90">90&deg;</option>
      <option value="180">180&deg;</option>
      <option value="270">270&deg;</option>
    </select>
  </div>
  <div id="pasteResult"></div>
  <div id="pastePanelButtons">
    <button id="pastePanelCancelBtn">Cancel</button>
    <button id="pastePanelApplyBtn">Paste</button>
  </div>
</div>

<!-- Full-screen busy overlay for save-editing operations (copy / paste /
     delete / undo / redo / export -- see SaveLoadFlow.showBusy in data.js).
     Blocks all input while the WASM worker crunches so it's unmistakable
     that something is happening. Shown only for operations that take a
     noticeable moment (a short delay avoids a flash on instant edits). -->
<div id="busyOverlay" style="display:none">
  <div id="busyBox">
    <div id="busySpinner"></div>
    <div id="busyLabel">Working&hellip;</div>
    <div id="busyBar"><div id="busyFill"></div></div>
    <div id="busyPhase"></div>
  </div>
</div>

<div id="selectionModalOverlay" style="display:none">
  <div id="selectionModal">
    <div id="selectionModalHeader">
      <span id="selectionModalTitle"></span>
      <button id="selectionModalClose" title="Close">&times;</button>
    </div>
    <div id="selectionModalSummary"></div>
    <div id="selectionModalList" class="itemLocationList"></div>
  </div>
</div>

<script src="vendor/leaflet.js"></script>
<script src="map.js"></script>
<script src="webgl_layer.js"></script>
<script src="filters.js"></script>
<script src="panels.js"></script>
<script src="altitude.js"></script>
<script src="tooltip.js"></script>
<script src="bottleneck.js"></script>
<script src="finditem.js"></script>
<script src="progression.js"></script>
<script src="selection.js"></script>
<script src="contextmenu.js"></script>
<script src="save_client.js"></script>
<script src="editor.js"></script>
<script src="data.js"></script>
</body>
</html>
