<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Satisfactory Save Map</title>
<link rel="stylesheet" href="vendor/leaflet.css">
<link rel="stylesheet" href="map.css">
</head>
<body>
<div id="sidebar">
  <div id="sidebarTop">
    <div id="sidebarHeader">
      <h1>Satisfactory Save Map</h1>
      <button id="changeModeBtn" title="Back to mode selection">&#8592; Change mode</button>
    </div>

    <div id="loadPanel">
      <label for="saveSelect">Save file</label>
      <select id="saveSelect"></select>
      <button id="loadButton">Load</button>
      <div id="loadStatus"></div>
      <div id="loadProgressBar"><div id="loadProgressFill"></div></div>
      <div id="totalObjectCount"></div>
    </div>

    <div id="sftpPanel" style="display:none"></div>

    <div id="gameSettingsPanel" style="display:none"></div>

    <div id="findItemPanel" style="display:none">
      <div class="findItemTitle">Find Item</div>
      <div class="findItemRow">
        <input type="text" id="findItemInput" list="findItemCatalog" placeholder="Search item...">
        <datalist id="findItemCatalog"></datalist>
        <button id="findItemButton">Find</button>
      </div>
      <div id="findItemResult" style="display:none">
        <div id="findItemSummary"></div>
        <div id="findItemList" class="itemLocationList"></div>
        <button id="findItemHighlightToggle">Show only these on map</button>
      </div>
    </div>

    <div id="dimensionalDepotPanel" style="display:none">
      <button id="dimensionalDepotButton">Dimensional Depot Contents</button>
      <div id="dimensionalDepotList" class="itemLocationList" style="display:none"></div>
    </div>
  </div>

  <div id="sidebarScroll">
    <div id="filterPanelHeader">
      <span id="filterPanelTitle">Map Layers</span>
      <button id="uncheckAllButton" title="Hide everything on the map">Uncheck all</button>
    </div>
    <div id="filterPanel"></div>
  </div>
</div>
<div id="map"></div>

<div id="altitudePanel" style="display:none">
  <div class="altitudeTitle">Altitude</div>
  <div id="altitudeMaxLabel" class="altitudeValue"></div>
  <div class="altitudeTrackWrap">
    <div class="altitudeTrackBg"></div>
    <div id="altitudeTrackFill" class="altitudeTrackFill"></div>
    <input type="range" id="altitudeMaxSlider" class="altitudeRangeInput" title="Maximum altitude">
    <input type="range" id="altitudeMinSlider" class="altitudeRangeInput" title="Minimum altitude">
  </div>
  <div id="altitudeMinLabel" class="altitudeValue"></div>
  <button id="altitudeResetButton">Reset</button>
</div>

<script src="vendor/leaflet.js"></script>
<script src="map.js"></script>
<script src="filters.js"></script>
<script src="altitude.js"></script>
<script src="tooltip.js"></script>
<script src="finditem.js"></script>
<script src="data.js"></script>
</body>
</html>
